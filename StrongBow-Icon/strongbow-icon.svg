<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="StrongBow">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF5563"/>
      <stop offset="0.5" stop-color="#DC1B2E"/>
      <stop offset="1" stop-color="#8E0A16"/>
    </linearGradient>
    <radialGradient id="vign" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#3A0006" stop-opacity="0.32"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.40" r="0.55">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" gradientUnits="userSpaceOnUse" x1="0" y1="110" x2="0" y2="402">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#FFF1F2"/>
      <stop offset="1" stop-color="#F7D7DB"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#3A0006" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="512" height="512" fill="url(#vign)"/>
  <rect x="0" y="0" width="512" height="512" fill="url(#glow)"/>

  <!-- mark: drawn bow & arrow -->
  <g transform="translate(-20,0)" filter="url(#softShadow)">
    <path d="M262,116 L150,256 L262,396" fill="none" stroke="#FFFFFF" stroke-opacity="0.92"
          stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M262,116 C330,150 360,200 360,256 C360,312 330,362 262,396" fill="none"
          stroke="url(#mark)" stroke-width="26" stroke-linecap="round"/>
    <path d="M132,256 L398,256" fill="none" stroke="url(#mark)" stroke-width="18" stroke-linecap="round"/>
    <path d="M438,256 L392,231 L392,281 Z" fill="url(#mark)"/>
  </g>
</svg>
